<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Cosine similarity and cosine distance use opposite score polarity</title>
  <desc id="desc">Exact, near, and orthogonal vectors keep the same semantic order while similarity uses higher scores and distance uses lower scores</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071521"/>
      <stop offset="1" stop-color="#10283A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="430" rx="26" fill="url(#bg)"/>
  <text x="600" y="47" text-anchor="middle" fill="#F4FAFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="700">Same ranking. Opposite score polarity.</text>
  <text x="600" y="75" text-anchor="middle" fill="#91AAB8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Cosine similarity and cosine distance preserve semantic order while reversing numeric direction.</text>

  <g transform="translate(50 100)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="530" height="282" rx="22" fill="#0A202D" stroke="#2F665F" stroke-width="1.5"/>
    <text x="28" y="38" fill="#69DFC8" font-size="15" font-weight="700" letter-spacing="1.3">COSINE SIMILARITY</text>
    <text x="502" y="38" text-anchor="end" fill="#DFF8F1" font-size="17" font-weight="700">higher score = better</text>

    <g transform="translate(28 58)">
      <rect width="474" height="48" rx="12" fill="#0D2934"/>
      <circle cx="24" cy="24" r="9" fill="#51E3C2"/>
      <text x="45" y="30" fill="#E9F5F8" font-size="15" font-weight="700">EXACT MATCH</text>
      <text x="320" y="30" fill="#DFF8F1" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">1.00</text>
      <rect x="384" y="11" width="72" height="26" rx="13" fill="#143F3B"/>
      <text x="420" y="29" text-anchor="middle" fill="#71E3CD" font-size="12" font-weight="700">KEEP</text>
    </g>

    <g transform="translate(28 115)">
      <rect width="474" height="48" rx="12" fill="#0D2934"/>
      <circle cx="24" cy="24" r="9" fill="#3A9184"/>
      <text x="45" y="30" fill="#E9F5F8" font-size="15" font-weight="700">NEAR</text>
      <text x="320" y="30" fill="#DFF8F1" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">0.80</text>
      <rect x="384" y="11" width="72" height="26" rx="13" fill="#143F3B"/>
      <text x="420" y="29" text-anchor="middle" fill="#71E3CD" font-size="12" font-weight="700">KEEP</text>
    </g>

    <g transform="translate(28 172)">
      <rect width="474" height="48" rx="12" fill="#0D2934"/>
      <circle cx="24" cy="24" r="9" fill="#31555D"/>
      <text x="45" y="30" fill="#E9F5F8" font-size="15" font-weight="700">ORTHOGONAL</text>
      <text x="320" y="30" fill="#DFF8F1" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">0.00</text>
      <rect x="384" y="11" width="72" height="26" rx="13" fill="#302933"/>
      <text x="420" y="29" text-anchor="middle" fill="#E5A9B4" font-size="12" font-weight="700">DROP</text>
    </g>

    <rect x="28" y="232" width="474" height="34" rx="10" fill="#071821" stroke="#27554F"/>
    <text x="45" y="254" fill="#9CB2BD" font-size="13">accept when</text>
    <text x="142" y="255" fill="#69DFC8" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16" font-weight="700">score ≥ 0.70</text>
  </g>

  <g transform="translate(620 100)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="530" height="282" rx="22" fill="#0A202D" stroke="#315A75" stroke-width="1.5"/>
    <text x="28" y="38" fill="#72B8F5" font-size="15" font-weight="700" letter-spacing="1.3">COSINE DISTANCE</text>
    <text x="502" y="38" text-anchor="end" fill="#E2F1FF" font-size="17" font-weight="700">lower score = better</text>

    <g transform="translate(28 58)">
      <rect width="474" height="48" rx="12" fill="#0D2934"/>
      <circle cx="24" cy="24" r="9" fill="#53A7FF"/>
      <text x="45" y="30" fill="#E9F5F8" font-size="15" font-weight="700">EXACT MATCH</text>
      <text x="320" y="30" fill="#E2F1FF" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">0.00</text>
      <rect x="384" y="11" width="72" height="26" rx="13" fill="#14394C"/>
      <text x="420" y="29" text-anchor="middle" fill="#75BEFF" font-size="12" font-weight="700">KEEP</text>
    </g>

    <g transform="translate(28 115)">
      <rect width="474" height="48" rx="12" fill="#0D2934"/>
      <circle cx="24" cy="24" r="9" fill="#3975A8"/>
      <text x="45" y="30" fill="#E9F5F8" font-size="15" font-weight="700">NEAR</text>
      <text x="320" y="30" fill="#E2F1FF" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">0.20</text>
      <rect x="384" y="11" width="72" height="26" rx="13" fill="#14394C"/>
      <text x="420" y="29" text-anchor="middle" fill="#75BEFF" font-size="12" font-weight="700">KEEP</text>
    </g>

    <g transform="translate(28 172)">
      <rect width="474" height="48" rx="12" fill="#0D2934"/>
      <circle cx="24" cy="24" r="9" fill="#30465D"/>
      <text x="45" y="30" fill="#E9F5F8" font-size="15" font-weight="700">ORTHOGONAL</text>
      <text x="320" y="30" fill="#E2F1FF" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">1.00</text>
      <rect x="384" y="11" width="72" height="26" rx="13" fill="#302933"/>
      <text x="420" y="29" text-anchor="middle" fill="#E5A9B4" font-size="12" font-weight="700">DROP</text>
    </g>

    <rect x="28" y="232" width="474" height="34" rx="10" fill="#071821" stroke="#294D68"/>
    <text x="45" y="254" fill="#9CB2BD" font-size="13">accept when</text>
    <text x="142" y="255" fill="#72B8F5" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16" font-weight="700">score ≤ 0.30</text>
  </g>

  <text x="600" y="412" text-anchor="middle" fill="#A1B6C0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">The candidates and acceptance decisions stay the same; only the numeric contract changes.</text>
</svg>
