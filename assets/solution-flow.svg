<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">How ScoreFence verifies a score contract</title>
  <desc id="desc">A controlled probe runs through an isolated target path, preserves raw observations, and produces an evidence-based contract verdict before cleanup</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071521"/>
      <stop offset="1" stop-color="#0D2636"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#51E3C2"/>
      <stop offset="1" stop-color="#53A7FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" rx="26" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" fill="#F3FAFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="700">From controlled evidence to a contract verdict</text>
  <text x="600" y="77" text-anchor="middle" fill="#82A1B1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Observe the real path; never infer score semantics from a field name.</text>

  <g transform="translate(42 112)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="252" height="294" rx="22" fill="#0B2230" stroke="#315E5A" stroke-width="1.5"/>
    <rect x="20" y="20" width="42" height="28" rx="14" fill="#143B36"/>
    <text x="41" y="39" text-anchor="middle" fill="#70E0C9" font-size="12" font-weight="700">01</text>
    <text x="20" y="82" fill="#E8F3F8" font-size="21" font-weight="700">Probe plan</text>
    <text x="20" y="109" fill="#86A2B1" font-size="14">Controlled fixtures</text>
    <text x="20" y="131" fill="#86A2B1" font-size="14">with known relations</text>
    <path d="M20 151 H232" stroke="#203E4C"/>

    <g transform="translate(26 154)">
      <circle cx="22" cy="25" r="11" fill="#51E3C2"/>
      <circle cx="100" cy="49" r="9" fill="#3B8E83"/>
      <circle cx="178" cy="73" r="7" fill="#27464D"/>
      <path d="M36 29 L87 45 M113 53 L166 69" fill="none" stroke="#4C7B91" stroke-width="4" stroke-linecap="round"/>
      <text x="22" y="94" text-anchor="middle" fill="#7898AA" font-size="11">exact</text>
      <text x="100" y="94" text-anchor="middle" fill="#7898AA" font-size="11">near</text>
      <text x="178" y="94" text-anchor="middle" fill="#7898AA" font-size="11">far</text>
    </g>

    <rect x="20" y="260" width="212" height="22" rx="11" fill="#081A24" stroke="#27554F"/>
    <text x="126" y="276" text-anchor="middle" fill="#69DFC8" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="12" font-weight="700">exact ≻ near ≻ far</text>
  </g>

  <g transform="translate(330 112)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="252" height="294" rx="22" fill="#0B2230" stroke="#397181" stroke-width="1.5"/>
    <rect x="20" y="20" width="42" height="28" rx="14" fill="#143B36"/>
    <text x="41" y="39" text-anchor="middle" fill="#70E0C9" font-size="12" font-weight="700">02</text>
    <text x="20" y="82" fill="#E8F3F8" font-size="21" font-weight="700">Isolated run</text>
    <text x="20" y="109" fill="#86A2B1" font-size="14">Adapter executes the</text>
    <text x="20" y="131" fill="#86A2B1" font-size="14">real target path</text>
    <path d="M20 151 H232" stroke="#203E4C"/>

    <g transform="translate(62 156)">
      <ellipse cx="64" cy="16" rx="60" ry="16" fill="#0C3040" stroke="#3C7180" stroke-width="1.5"/>
      <path d="M4 16 V79 C4 89 31 97 64 97 C97 97 124 89 124 79 V16" fill="#0C3040" stroke="#3C7180" stroke-width="1.5"/>
      <path d="M4 46 C4 56 31 64 64 64 C97 64 124 56 124 46" fill="none" stroke="#3C7180" stroke-width="1.5"/>
      <path d="M49 76 L61 88 L84 62" fill="none" stroke="#5FE0B9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <rect x="38" y="260" width="176" height="22" rx="11" fill="#081A24" stroke="#2D5F68"/>
    <text x="126" y="276" text-anchor="middle" fill="#76B9CD" font-size="12" font-weight="700">temporary namespace</text>
  </g>

  <g transform="translate(618 112)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="252" height="294" rx="22" fill="#0B2230" stroke="#3C5F7A" stroke-width="1.5"/>
    <rect x="20" y="20" width="42" height="28" rx="14" fill="#15354A"/>
    <text x="41" y="39" text-anchor="middle" fill="#72B8F5" font-size="12" font-weight="700">03</text>
    <text x="20" y="82" fill="#E8F3F8" font-size="21" font-weight="700">Raw observations</text>
    <text x="20" y="109" fill="#86A2B1" font-size="14">Preserve IDs, order,</text>
    <text x="20" y="131" fill="#86A2B1" font-size="14">and unmodified scores</text>
    <path d="M20 151 H232" stroke="#203E4C"/>

    <g transform="translate(20 170)" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="13">
      <rect width="212" height="104" rx="13" fill="#071821" stroke="#294A5D"/>
      <text x="16" y="27" fill="#6F8B99">01</text><text x="48" y="27" fill="#6FDCC7">exact</text><text x="192" y="27" text-anchor="end" fill="#C4D7E0">0.00</text>
      <path d="M16 37 H196" stroke="#17313E"/>
      <text x="16" y="58" fill="#6F8B99">02</text><text x="48" y="58" fill="#70AACE">near</text><text x="192" y="58" text-anchor="end" fill="#C4D7E0">0.20</text>
      <path d="M16 68 H196" stroke="#17313E"/>
      <text x="16" y="89" fill="#6F8B99">03</text><text x="48" y="89" fill="#91A8B4">far</text><text x="192" y="89" text-anchor="end" fill="#C4D7E0">1.00</text>
    </g>
  </g>

  <g transform="translate(906 112)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="252" height="294" rx="22" fill="#0B2230" stroke="#4A6680" stroke-width="1.5"/>
    <rect x="20" y="20" width="42" height="28" rx="14" fill="#292E50"/>
    <text x="41" y="39" text-anchor="middle" fill="#AAB6FF" font-size="12" font-weight="700">04</text>
    <text x="20" y="82" fill="#E8F3F8" font-size="21" font-weight="700">Verify &amp; report</text>
    <text x="20" y="109" fill="#86A2B1" font-size="14">Compare declarations</text>
    <text x="20" y="131" fill="#86A2B1" font-size="14">with observed behavior</text>
    <path d="M20 151 H232" stroke="#203E4C"/>

    <g transform="translate(20 166)" font-size="13">
      <rect width="212" height="78" rx="13" fill="#071821" stroke="#3A4269"/>
      <text x="15" y="24" fill="#9BB0BB">direction</text><text x="197" y="24" text-anchor="end" fill="#AAB6FF">lower</text>
      <text x="15" y="47" fill="#9BB0BB">ordering</text><text x="197" y="47" text-anchor="end" fill="#69DFC8">PASS</text>
      <text x="15" y="68" fill="#9BB0BB">threshold</text><text x="197" y="68" text-anchor="end" fill="#F1BD72">≥ 0.70</text>
    </g>

    <rect x="20" y="254" width="212" height="28" rx="14" fill="#3C3022" stroke="#6B5030"/>
    <text x="36" y="273" fill="#F1BD72" font-size="12" font-weight="700">FAIL</text>
    <text x="216" y="273" text-anchor="end" fill="#D6B889" font-size="12">SF103 · threshold polarity</text>
  </g>

  <g fill="none" stroke="#6B97AC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <g>
      <circle cx="312" cy="259" r="15" fill="#0D2B3A" stroke="#31586B"/>
      <path d="M305 259 H319 M314 254 L319 259 L314 264"/>
    </g>
    <g>
      <circle cx="600" cy="259" r="15" fill="#0D2B3A" stroke="#31586B"/>
      <path d="M593 259 H607 M602 254 L607 259 L602 264"/>
    </g>
    <g>
      <circle cx="888" cy="259" r="15" fill="#0D2B3A" stroke="#31586B"/>
      <path d="M881 259 H895 M890 254 L895 259 L890 264"/>
    </g>
  </g>

  <g transform="translate(42 432)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="1116" height="44" rx="14" fill="#081A24" stroke="#284657"/>
    <circle cx="24" cy="22" r="10" fill="#143B36"/>
    <path d="M19 22 L23 26 L30 18" fill="none" stroke="#63DFC5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="27" fill="#BDD0D9" font-size="13" font-weight="700">ISOLATION LIFECYCLE</text>
    <text x="208" y="27" fill="#91AAB8" font-size="13">setup → execute → observe → verify → cleanup</text>
    <text x="1092" y="27" text-anchor="end" fill="#9DB3BE" font-size="13">unsafe isolation / cleanup → INCONCLUSIVE</text>
  </g>
</svg>
