      <rect x="77" y="31" width="80" height="84" rx="13" fill="#071721" stroke="#31584F"/>
      <path d="M94 72 L109 87 L140 53" fill="none" stroke="#66E2B2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="117" y="139" text-anchor="middle" fill="#E8F3F8" font-size="21" font-weight="700">Report</text>
      <text x="117" y="165" text-anchor="middle" fill="#7F9EAE" font-size="16">Portable evidence</text>
