  </defs>

  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>
  <circle cx="1120" cy="10" r="200" fill="#2C688E" opacity="0.10"/>
  <circle cx="80" cy="360" r="180" fill="#218C78" opacity="0.08"/>

