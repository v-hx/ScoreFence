    <text x="2" y="158" fill="#7898AA" font-size="18">Vendor-neutral · Out-of-band · Evidence-first</text>
  </g>

  <g transform="translate(650 71)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <g>
      <rect width="132" height="156" rx="20" fill="#0B2230" stroke="#294B5E"/>
